services:
  browserless:
    image: ghcr.io/browserless/chromium:latest
    ports:
      - "3000:3000"
    environment:
      TOKEN: localdev
      # Allow unlimited concurrent sessions in local dev
      CONCURRENT: 10
      # Keep sessions alive for up to 30 min (matches our LLM traversal time)
      TIMEOUT: 1800000
    restart: unless-stopped
